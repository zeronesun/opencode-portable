name: Auto Build & Release
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23

      - name: Install deps
        run: |
          sudo apt update && sudo apt install -y build-essential git curl jq docker.io

      - name: Get latest upstream tag
        id: uptag
        run: |
          TAG=$(curl -s https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if already released
        run: |
          if git rev-parse ${{ steps.uptag.outputs.tag }}-portable >/dev/null 2>&1; then
            echo "已存在该版本，跳过构建"
            exit 0
          fi

      - name: Clone upstream opencode
        run: |
          git clone --depth 1 --branch ${{ steps.uptag.outputs.tag }} https://github.com/anomalyco/opencode upstream

      - name: Apply CJK patch
        run: |
          cd upstream
          git apply ../patches/001-cjk-fix.patch

      - name: Build with musl
        run: |
          chmod +x build/build.sh
          ./build/build.sh upstream ${{ steps.uptag.outputs.tag }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.uptag.outputs.tag }}-portable
          generate_release_notes: true
