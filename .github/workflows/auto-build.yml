name: Auto Build & Release
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get latest upstream version
        id: upstream
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r .tag_name)
          echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "Found upstream version: $UPSTREAM_TAG"

      - name: Check if version exists
        id: check
        run: |
          TARGET_TAG=${UPSTREAM_TAG}-portable
          if git ls-remote --tags origin | grep -q "refs/tags/$TARGET_TAG"; then
            echo "Version $TARGET_TAG already exists, skipping build"
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
          else
            echo "Version $TARGET_TAG does not exist, starting build"
            echo "SKIP_BUILD=false" >> $GITHUB_OUTPUT
            echo "TARGET_TAG=$TARGET_TAG" >> $GITHUB_OUTPUT
          fi
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.UPSTREAM_TAG }}

      - name: Clone upstream code
        if: steps.check.outputs.SKIP_BUILD == 'false'
        run: git clone --depth 1 --branch ${{ steps.upstream.outputs.UPSTREAM_TAG }} https://github.com/anomalyco/opencode upstream

      - name: Apply CJK patch
        if: steps.check.outputs.SKIP_BUILD == 'false'
        run: cd upstream && git apply ../patches/001-cjk-fix.patch

      - name: Build binaries
        if: steps.check.outputs.SKIP_BUILD == 'false'
        run: |
          chmod +x build/build.sh
          ./build/build.sh upstream ${{ steps.upstream.outputs.UPSTREAM_TAG }}

      - name: Generate SHA256 checksums
        if: steps.check.outputs.SKIP_BUILD == 'false'
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          echo "Checksums generated:"
          cat SHA256SUMS

      - name: Create Release
        if: steps.check.outputs.SKIP_BUILD == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.TARGET_TAG }}
          name: OpenCode ${{ steps.upstream.outputs.UPSTREAM_TAG }} (Portable CJK Edition)
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
