name: Auto Build & Release
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y wget

      - name: Get latest official version
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r .tag_name)
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Latest version: $TAG"

      - name: Build portable packages
        run: |
          chmod +x build/build.sh
          ./build/build.sh ${{ steps.upstream.outputs.TAG }} x86_64
          ./build/build.sh ${{ steps.upstream.outputs.TAG }} arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.TAG }}-portable
          name: OpenCode ${{ steps.upstream.outputs.TAG }} (Portable)
          files: dist/*.tar.gz
